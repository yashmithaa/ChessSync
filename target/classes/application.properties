# Application config
spring.application.name=Chess Application
server.port=8080
spring.main.headless=false

# Database configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/chess_db?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:chess_app}
spring.datasource.password=${DB_PASSWORD:chess_app_123}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
# H2 Database config for development (uncomment these and comment MySQL config above for H2)
# spring.datasource.url=jdbc:h2:mem:chess_db
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=chessgameapplicationsecretkeyforjwttokenauthentication
jwt.expiration=86400000

# Desktop Swing UI (disabled by default for headless/server runs)
app.ui.enabled=true